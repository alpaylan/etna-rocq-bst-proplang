name = "bst-proplang-rocq"
language = "Rocq"
description = "Binary Search Tree workload using the PropLang runner framework (Rocq/Coq)."

mutations = [
  "insert_1",
  "insert_2",
  "insert_3",
  "delete_4",
  "delete_5",
  "union_6",
  "union_7",
  "union_8",
]

[[tasks]]
mutations = ["insert_1"]
tasks = [
  { property = "InsertPost", witnesses = [{ input = "((T E 2 1 E) 0 2 0)" }] },
  { property = "InsertModel", witnesses = [{ input = "((T E 1 0 E) 0 0)" }] },
  { property = "DeleteInsert", witnesses = [{ input = "((T E 1 0 E) 0 0 0)" }] },
  { property = "InsertInsert", witnesses = [{ input = "(E 1 0 0 0)" }] },
  { property = "InsertUnion", witnesses = [{ input = "(E (T E 1 1 E) 0 0)" }] },
  { property = "UnionDeleteInsert", witnesses = [{ input = "((T E 2 0 E) E 0 0)" }] },
]

